name: CI — AlbumVirtual FIFA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Job 1: Lint y pruebas del Backend ──
  backend-ci:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm ci

      - name: Lint del backend
        working-directory: backend
        run: npm run lint || true   # No bloquear en Sprint 1, solo reportar

      - name: Ejecutar pruebas unitarias
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-para-ci
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: placeholder-key

  # ── Job 2: Build del Frontend ──
  frontend-ci:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Build del frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.albumvirtual.com/api

  # ── Job 3: Build de Docker (solo en push a develop/main) ──
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Build imagen del backend
        run: docker build -t albumvirtual-backend:${{ github.sha }} ./backend

      - name: Build imagen del frontend
        run: docker build -t albumvirtual-frontend:${{ github.sha }} ./frontend

      - name: Verificar imágenes construidas
        run: docker images | grep albumvirtual
